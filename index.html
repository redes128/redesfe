<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Editor ALENIS</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #080c14;
      --surface: #0f1520;
      --panel: #141c2e;
      --border: #1e2d4a;
      --accent: #1d6fe8;
      --accent2: #00d4ff;
      --text: #e8f0ff;
      --muted: #5a7090;
      --danger: #ff4060;
      --success: #00e676;
      --radius: 12px;
      --panel-w: 280px;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
    }

    /* ── LAYOUT ── */
    #app {
      display: grid;
      grid-template-rows: auto 1fr auto;
      height: 100dvh;
    }

    /* ── HEADER ── */
    #header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      gap: 10px;
      flex-shrink: 0;
    }
    #header h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.6rem;
      letter-spacing: 3px;
      background: linear-gradient(135deg, var(--accent2), var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      flex-shrink: 0;
    }
    #header-actions {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .upload-label {
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--accent);
      color: #fff;
      padding: 8px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.82rem;
      font-weight: 500;
      white-space: nowrap;
      transition: background 0.2s;
    }
    .upload-label:hover { background: #2d7df5; }
    #fileInput { display: none; }

    /* ── MIDDLE AREA ── */
    #middle {
      display: flex;
      overflow: hidden;
      position: relative;
    }

    /* ── CANVAS ZONE ── */
    #canvasZone {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 12px;
      gap: 10px;
      overflow: hidden;
    }
    #canvasWrap {
      position: relative;
      width: min(80vw, 80vh, 520px);
      height: min(80vw, 80vh, 520px);
      background: #000;
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: 0 0 0 1px var(--border), 0 20px 60px rgba(0,0,0,0.7);
      touch-action: none;
    }
    canvas {
      width: 100%;
      height: 100%;
      cursor: grab;
      display: block;
    }
    canvas.dragging { cursor: grabbing; }

    /* Empty state */
    #emptyState {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: var(--muted);
      pointer-events: none;
    }
    #emptyState svg { opacity: 0.3; }
    #emptyState p { font-size: 0.9rem; text-align: center; }

    /* Nav arrows */
    #navRow {
      display: flex;
      gap: 10px;
      align-items: center;
    }
    .navBtn {
      background: var(--panel);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 8px;
      padding: 8px 18px;
      cursor: pointer;
      font-size: 1.1rem;
      transition: background 0.2s;
      min-width: 48px;
    }
    .navBtn:hover, .navBtn:active { background: var(--border); }
    #imgCounter {
      font-size: 0.8rem;
      color: var(--muted);
      min-width: 60px;
      text-align: center;
    }

    /* ── SIDE PANEL (desktop) ── */
    #sidePanel {
      width: var(--panel-w);
      background: var(--panel);
      border-left: 1px solid var(--border);
      padding: 16px 14px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 6px;
      flex-shrink: 0;
    }
    .section-title {
      font-size: 0.68rem;
      letter-spacing: 2px;
      color: var(--muted);
      text-transform: uppercase;
      margin: 8px 0 4px;
    }
    .slider-row {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .slider-label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.78rem;
    }
    .slider-val {
      color: var(--accent2);
      font-variant-numeric: tabular-nums;
      font-size: 0.75rem;
    }
    input[type=range] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 4px;
      border-radius: 2px;
      background: var(--border);
      outline: none;
      cursor: pointer;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 16px; height: 16px;
      border-radius: 50%;
      background: var(--accent);
      border: 2px solid var(--accent2);
      cursor: pointer;
    }
    input[type=range]::-moz-range-thumb {
      width: 16px; height: 16px;
      border-radius: 50%;
      background: var(--accent);
      border: 2px solid var(--accent2);
      cursor: pointer;
    }
    .panel-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      width: 100%;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text);
      cursor: pointer;
      font-size: 0.82rem;
      font-family: 'DM Sans', sans-serif;
      transition: all 0.15s;
      margin-top: 2px;
    }
    .panel-btn:hover, .panel-btn:active { background: var(--border); }
    .panel-btn.primary { background: var(--accent); border-color: var(--accent); }
    .panel-btn.primary:hover { background: #2d7df5; }
    .panel-btn.danger { border-color: var(--danger); color: var(--danger); }
    .panel-btn.danger:hover { background: rgba(255,64,96,0.12); }
    .panel-btn.success { border-color: var(--success); color: var(--success); }
    .panel-btn.success:hover { background: rgba(0,230,118,0.1); }

    /* ── BOTTOM TOOLBAR (mobile) ── */
    #bottomBar {
      display: none;
      background: var(--surface);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }
    #tabRow {
      display: flex;
      justify-content: space-around;
      padding: 0;
    }
    .tab-btn {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      padding: 10px 4px;
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 0.6rem;
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      transition: color 0.2s;
    }
    .tab-btn.active { color: var(--accent2); }
    .tab-btn svg { width: 22px; height: 22px; }

    /* Slide-up sheet */
    #sheet {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 100;
    }
    #sheetBackdrop {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(4px);
    }
    #sheetContent {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      background: var(--panel);
      border-top: 1px solid var(--border);
      border-radius: 20px 20px 0 0;
      padding: 16px 18px 28px;
      max-height: 72dvh;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .sheet-handle {
      width: 40px; height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin: 0 auto 10px;
    }
    #sheetTitle {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.2rem;
      letter-spacing: 2px;
      color: var(--accent2);
      margin-bottom: 6px;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 680px) {
      #sidePanel { display: none; }
      #bottomBar { display: block; }
      #canvasWrap {
        width: min(92vw, 92svw);
        height: min(92vw, 92svw);
      }
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* Toast */
    #toast {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #1a2740;
      border: 1px solid var(--accent);
      color: var(--text);
      padding: 10px 20px;
      border-radius: 100px;
      font-size: 0.82rem;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s, transform 0.3s;
      white-space: nowrap;
      z-index: 999;
    }
    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>
<div id="app">

  <!-- HEADER -->
  <header id="header">
    <h1>✦ ALENIS EDITOR</h1>
    <div id="header-actions">
      <label class="upload-label" for="fileInput">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        Subir fotos
      </label>
      <input type="file" id="fileInput" accept="image/*" multiple>
    </div>
  </header>

  <!-- MIDDLE -->
  <div id="middle">

    <!-- CANVAS -->
    <div id="canvasZone">
      <div id="canvasWrap">
        <canvas id="editorCanvas" width="1080" height="1080"></canvas>
        <div id="emptyState">
          <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
          <p>Sube tus fotos<br>para comenzar</p>
        </div>
      </div>
      <div id="navRow">
        <button class="navBtn" id="prevBtn">‹</button>
        <span id="imgCounter">—</span>
        <button class="navBtn" id="nextBtn">›</button>
      </div>
    </div>

    <!-- SIDE PANEL (desktop) -->
    <aside id="sidePanel">
      <p class="section-title">Ajustes</p>
      <div class="slider-row"><div class="slider-label"><span>☀ Brillo</span><span class="slider-val" id="valBrightness">1.00</span></div><input type="range" id="brightness" min="0" max="2" step="0.01" value="1"></div>
      <div class="slider-row"><div class="slider-label"><span>◎ Contraste</span><span class="slider-val" id="valContrast">1.00</span></div><input type="range" id="contrast" min="0" max="2" step="0.01" value="1"></div>
      <div class="slider-row"><div class="slider-label"><span>✦ Saturación</span><span class="slider-val" id="valSaturation">1.00</span></div><input type="range" id="saturation" min="0" max="2" step="0.01" value="1"></div>
      <div class="slider-row"><div class="slider-label"><span>⬡ Nitidez</span><span class="slider-val" id="valSharpness">0.00</span></div><input type="range" id="sharpness" min="0" max="1" step="0.01" value="0"></div>
      <div class="slider-row"><div class="slider-label"><span>◉ Viñeta</span><span class="slider-val" id="valVignette">0.00</span></div><input type="range" id="vignette" min="0" max="1" step="0.01" value="0"></div>
      <div class="slider-row"><div class="slider-label"><span>⊕ Zoom</span><span class="slider-val" id="valZoom">1.00</span></div><input type="range" id="zoom" min="0.5" max="3" step="0.01" value="1"></div>

      <p class="section-title" style="margin-top:14px">Acciones</p>
      <button class="panel-btn danger" id="resetBtn">↺ Reiniciar ajustes</button>
      <button class="panel-btn primary" id="downloadBtn">↓ Descargar imagen</button>
      <button class="panel-btn success" id="downloadAllBtn">↓ Descargar todas (.zip)</button>
    </aside>
  </div>

  <!-- BOTTOM BAR (mobile) -->
  <div id="bottomBar">
    <div id="tabRow">
      <button class="tab-btn active" data-sheet="ajustes">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/></svg>
        Ajustes
      </button>
      <button class="tab-btn" data-sheet="acciones">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 5v14M5 12l7 7 7-7"/></svg>
        Guardar
      </button>
    </div>
  </div>
</div>

<!-- SHEET (mobile) -->
<div id="sheet">
  <div id="sheetBackdrop"></div>
  <div id="sheetContent">
    <div class="sheet-handle"></div>
    <div id="sheetTitle">AJUSTES</div>
    <div id="sheetBody"></div>
  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.7.1/jszip.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
<script>
const FRAME_SRC = 'nasa.png';

const canvas   = document.getElementById('editorCanvas');
const ctx      = canvas.getContext('2d');
const empty    = document.getElementById('emptyState');
const counter  = document.getElementById('imgCounter');

// Sliders (desktop)
const sliders = {
  brightness: document.getElementById('brightness'),
  contrast:   document.getElementById('contrast'),
  saturation: document.getElementById('saturation'),
  sharpness:  document.getElementById('sharpness'),
  vignette:   document.getElementById('vignette'),
  zoom:       document.getElementById('zoom'),
};
const vals = {
  brightness: document.getElementById('valBrightness'),
  contrast:   document.getElementById('valContrast'),
  saturation: document.getElementById('valSaturation'),
  sharpness:  document.getElementById('valSharpness'),
  vignette:   document.getElementById('valVignette'),
  zoom:       document.getElementById('valZoom'),
};

const DEFAULTS = { brightness:1, contrast:1, saturation:1, sharpness:0, vignette:0, zoom:1, offsetX:0, offsetY:0 };

let images = [], currentIndex = 0;
let offsetX = 0, offsetY = 0;
let isDragging = false;
let startX, startY;
let lastDist = null; // pinch zoom

// Frame
const frameImage = new Image();
frameImage.src = FRAME_SRC;
frameImage.onload = draw;

// ── FILE INPUT ──
document.getElementById('fileInput').addEventListener('change', e => {
  images = [];
  const files = e.target.files;
  if (!files.length) return;
  let loaded = 0;
  for (let i = 0; i < files.length; i++) {
    const img = new Image();
    img.onload = () => {
      images[i] = { img, filters: { ...DEFAULTS } };
      loaded++;
      if (loaded === files.length) {
        images = images.filter(Boolean);
        currentIndex = 0;
        syncSliders();
        draw();
        toast(`${files.length} foto${files.length>1?'s':''} cargada${files.length>1?'s':''}`);
      }
    };
    img.src = URL.createObjectURL(files[i]);
  }
});

// ── NAV ──
document.getElementById('prevBtn').addEventListener('click', () => navigate(-1));
document.getElementById('nextBtn').addEventListener('click', () => navigate(1));

function navigate(dir) {
  if (!images.length) return;
  saveFilters();
  currentIndex = (currentIndex + dir + images.length) % images.length;
  syncSliders();
  draw();
}

// ── RESET ──
document.getElementById('resetBtn').addEventListener('click', () => {
  if (!images.length) return;
  images[currentIndex].filters = { ...DEFAULTS };
  syncSliders();
  draw();
  toast('Ajustes reiniciados');
});

// ── DOWNLOAD ──
document.getElementById('downloadBtn').addEventListener('click', exportCurrent);
document.getElementById('downloadAllBtn').addEventListener('click', exportAll);

// ── SLIDERS ──
Object.values(sliders).forEach(s => s.addEventListener('input', () => { updateVals(); draw(); }));

function updateVals() {
  Object.keys(sliders).forEach(k => {
    vals[k].textContent = parseFloat(sliders[k].value).toFixed(2);
  });
}

function getFilters() {
  return {
    brightness: parseFloat(sliders.brightness.value),
    contrast:   parseFloat(sliders.contrast.value),
    saturation: parseFloat(sliders.saturation.value),
    sharpness:  parseFloat(sliders.sharpness.value),
    vignette:   parseFloat(sliders.vignette.value),
    zoom:       parseFloat(sliders.zoom.value),
  };
}

function saveFilters() {
  if (!images.length) return;
  images[currentIndex].filters = { ...getFilters(), offsetX, offsetY };
}

function syncSliders() {
  if (!images.length) return;
  const f = images[currentIndex].filters;
  Object.keys(sliders).forEach(k => { if (sliders[k] && f[k] !== undefined) sliders[k].value = f[k]; });
  offsetX = f.offsetX; offsetY = f.offsetY;
  updateVals();
  counter.textContent = `${currentIndex+1} / ${images.length}`;
  empty.style.display = 'none';
  // also sync sheet sliders if open
  syncSheetSliders();
}

// ── DRAW ──
function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  if (!images.length) {
    empty.style.display = 'flex';
    counter.textContent = '—';
    return;
  }
  empty.style.display = 'none';
  counter.textContent = `${currentIndex+1} / ${images.length}`;

  const { img } = images[currentIndex];
  const f = getFilters();

  ctx.save();
  ctx.translate(canvas.width/2 + offsetX, canvas.height/2 + offsetY);
  ctx.scale(f.zoom, f.zoom);
  ctx.filter = `brightness(${f.brightness}) contrast(${f.contrast}) saturate(${f.saturation})`;

  const scale = Math.min(canvas.width / img.width, canvas.height / img.height);
  ctx.drawImage(img, -(img.width*scale)/2, -(img.height*scale)/2, img.width*scale, img.height*scale);
  ctx.restore();

  ctx.drawImage(frameImage, 0, 0, canvas.width, canvas.height);

  if (f.vignette > 0) {
    const grd = ctx.createRadialGradient(
      canvas.width/2, canvas.height/2, canvas.width/2*(1-f.vignette),
      canvas.width/2, canvas.height/2, canvas.width/2
    );
    grd.addColorStop(0, 'rgba(0,0,0,0)');
    grd.addColorStop(1, `rgba(0,0,0,${f.vignette})`);
    ctx.fillStyle = grd;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
  }
}

// ── MOUSE DRAG ──
canvas.addEventListener('mousedown', e => {
  isDragging = true;
  canvas.classList.add('dragging');
  startX = e.offsetX; startY = e.offsetY;
});
canvas.addEventListener('mouseup', () => { isDragging = false; canvas.classList.remove('dragging'); saveFilters(); });
canvas.addEventListener('mouseleave', () => { isDragging = false; canvas.classList.remove('dragging'); });
canvas.addEventListener('mousemove', e => {
  if (!isDragging) return;
  const rect = canvas.getBoundingClientRect();
  const sx = canvas.width / rect.width;
  const sy = canvas.height / rect.height;
  offsetX += (e.offsetX - startX) * sx;
  offsetY += (e.offsetY - startY) * sy;
  startX = e.offsetX; startY = e.offsetY;
  draw();
});

// ── TOUCH DRAG + PINCH ZOOM ──
function getTouchPos(e, idx=0) {
  const rect = canvas.getBoundingClientRect();
  const sx = canvas.width / rect.width;
  const sy = canvas.height / rect.height;
  return {
    x: (e.touches[idx].clientX - rect.left) * sx,
    y: (e.touches[idx].clientY - rect.top) * sy
  };
}
function dist(e) {
  const dx = e.touches[0].clientX - e.touches[1].clientX;
  const dy = e.touches[0].clientY - e.touches[1].clientY;
  return Math.hypot(dx, dy);
}

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  if (e.touches.length === 1) {
    isDragging = true;
    const p = getTouchPos(e);
    startX = p.x; startY = p.y;
    lastDist = null;
  } else if (e.touches.length === 2) {
    isDragging = false;
    lastDist = dist(e);
  }
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (e.touches.length === 1 && isDragging) {
    const p = getTouchPos(e);
    offsetX += p.x - startX;
    offsetY += p.y - startY;
    startX = p.x; startY = p.y;
    draw();
  } else if (e.touches.length === 2 && lastDist !== null) {
    const d = dist(e);
    const delta = d / lastDist;
    let z = parseFloat(sliders.zoom.value) * delta;
    z = Math.min(Math.max(z, 0.5), 3);
    sliders.zoom.value = z;
    vals.zoom.textContent = z.toFixed(2);
    // sync sheet if open
    const sheetZoom = document.getElementById('sheet-zoom');
    if (sheetZoom) { sheetZoom.value = z; document.getElementById('sheet-val-zoom').textContent = z.toFixed(2); }
    lastDist = d;
    draw();
  }
}, { passive: false });

canvas.addEventListener('touchend', e => {
  isDragging = false;
  lastDist = null;
  saveFilters();
});

// ── EXPORT ──
function exportCurrent() {
  if (!images.length) { toast('No hay imagen'); return; }
  draw();
  canvas.toBlob(blob => {
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `alenis_editada_${currentIndex+1}.png`;
    a.click();
    toast('¡Imagen descargada!');
  }, 'image/png');
}

async function exportAll() {
  if (!images.length) { toast('No hay imágenes'); return; }
  toast('Generando ZIP…');
  const zip = new JSZip();
  const saved = { index: currentIndex, offsetX, offsetY };
  for (let i = 0; i < images.length; i++) {
    currentIndex = i;
    syncSliders();
    draw();
    await new Promise(r => setTimeout(r, 30)); // let canvas paint
    const dataURL = canvas.toDataURL('image/png');
    zip.file(`alenis_editada_${i+1}.png`, dataURL.split(',')[1], { base64: true });
  }
  currentIndex = saved.index;
  syncSliders();
  draw();
  const content = await zip.generateAsync({ type: 'blob' });
  saveAs(content, 'alenis_editadas.zip');
  toast('¡ZIP descargado!');
}

// ── MOBILE SHEET ──
const SHEET_CONFIG = {
  ajustes: {
    title: 'AJUSTES',
    html: () => `
      ${sliderHTML('brightness','☀ Brillo','0','2','0.01')}
      ${sliderHTML('contrast','◎ Contraste','0','2','0.01')}
      ${sliderHTML('saturation','✦ Saturación','0','2','0.01')}
      ${sliderHTML('sharpness','⬡ Nitidez','0','1','0.01')}
      ${sliderHTML('vignette','◉ Viñeta','0','1','0.01')}
      ${sliderHTML('zoom','⊕ Zoom','0.5','3','0.01')}
      <button class="panel-btn danger" onclick="sheetReset()" style="margin-top:10px">↺ Reiniciar ajustes</button>
    `
  },
  acciones: {
    title: 'GUARDAR',
    html: () => `
      <button class="panel-btn primary" onclick="exportCurrent();closeSheet()" style="padding:14px 12px;font-size:0.9rem">↓ Descargar imagen actual</button>
      <button class="panel-btn success" onclick="exportAll();closeSheet()" style="padding:14px 12px;font-size:0.9rem">↓ Descargar todas (.zip)</button>
    `
  }
};

function sliderHTML(id, label, min, max, step) {
  const f = images.length ? images[currentIndex].filters : DEFAULTS;
  const v = f[id] !== undefined ? f[id] : DEFAULTS[id];
  return `
    <div class="slider-row">
      <div class="slider-label"><span>${label}</span><span class="slider-val" id="sheet-val-${id}">${parseFloat(v).toFixed(2)}</span></div>
      <input type="range" id="sheet-${id}" min="${min}" max="${max}" step="${step}" value="${v}"
        oninput="sheetSlide('${id}',this.value)">
    </div>`;
}

function sheetSlide(key, val) {
  val = parseFloat(val);
  document.getElementById(`sheet-val-${key}`).textContent = val.toFixed(2);
  sliders[key].value = val;
  vals[key].textContent = val.toFixed(2);
  draw();
}

function sheetReset() {
  if (!images.length) return;
  images[currentIndex].filters = { ...DEFAULTS };
  syncSliders();
  draw();
  toast('Ajustes reiniciados');
}

function syncSheetSliders() {
  if (!images.length) return;
  const f = images[currentIndex].filters;
  Object.keys(sliders).forEach(k => {
    const el = document.getElementById(`sheet-${k}`);
    const vel = document.getElementById(`sheet-val-${k}`);
    if (el) { el.value = f[k]; vel.textContent = parseFloat(f[k]).toFixed(2); }
  });
}

document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    openSheet(btn.dataset.sheet);
  });
});

function openSheet(name) {
  const cfg = SHEET_CONFIG[name];
  document.getElementById('sheetTitle').textContent = cfg.title;
  document.getElementById('sheetBody').innerHTML = cfg.html();
  document.getElementById('sheet').style.display = 'block';
}

function closeSheet() {
  document.getElementById('sheet').style.display = 'none';
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
}

document.getElementById('sheetBackdrop').addEventListener('click', closeSheet);

// ── TOAST ──
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

updateVals();
draw();
</script>
</body>
